<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para começar a assistir na Netflix">
    <title>Beastflix</title>
    <link rel="stylesheet" href="styles/stylesheet.css">
    <link rel="catalogo" href="styles/catalogo.css">
</head>
<body>
    <main class="conteudo-principal">
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        <section class="profiles">
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Bear.png" alt="Bear">
                        <figcaption>Bear</figcaption>
                    </figure>
                </a>
            </article>
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Cat.png" alt="Cat">
                        <figcaption>Cat</figcaption>
                    </figure>
                </a>
            </article>
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Owl.png" alt="Owl">
                        <figcaption>Owl</figcaption>
                    </figure>
                </a>
            </article>
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Wolf.png" alt="Wolf">
                        <figcaption>Wolf</figcaption>
                    </figure>
                </a>
            </article>
        </section>
    </main>

    <!-- Script para efeito de sombra dinâmica -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const profiles = document.querySelectorAll('.profile');
            profiles.forEach(profile => {
                const img = profile.querySelector('img');
                const figure = profile.querySelector('figure');
                let dominantColor = null;

                const calculateColor = function() {
                    if (dominantColor) return dominantColor;
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;

                    const quantize = (r, g, b) => {
                        const qr = Math.round(r / 16) * 16;
                        const qg = Math.round(g / 16) * 16;
                        const qb = Math.round(b / 16) * 16;
                        return `rgb(${qr},${qg},${qb})`;
                    };

                    const borderCount = {};
                    const pushColor = (r, g, b, a) => {
                        if (a <= 128) return;
                        const color = quantize(r, g, b);
                        borderCount[color] = (borderCount[color] || 0) + 1;
                    };

                    const w = canvas.width;
                    const h = canvas.height;

                    for (let x = 0; x < w; x++) {
                        const topIndex = (0 * w + x) * 4;
                        const bottomIndex = ((h - 1) * w + x) * 4;
                        pushColor(data[topIndex], data[topIndex+1], data[topIndex+2], data[topIndex+3]);
                        pushColor(data[bottomIndex], data[bottomIndex+1], data[bottomIndex+2], data[bottomIndex+3]);
                    }
                    for (let y = 1; y < h - 1; y++) {
                        const leftIndex = (y * w + 0) * 4;
                        const rightIndex = (y * w + (w - 1)) * 4;
                        pushColor(data[leftIndex], data[leftIndex+1], data[leftIndex+2], data[leftIndex+3]);
                        pushColor(data[rightIndex], data[rightIndex+1], data[rightIndex+2], data[rightIndex+3]);
                    }

                    let borderDominant = null;
                    let borderMaxCount = 0;
                    for (const color in borderCount) {
                        if (borderCount[color] > borderMaxCount) {
                            borderMaxCount = borderCount[color];
                            borderDominant = color;
                        }
                    }

                    if (borderDominant) {
                        dominantColor = borderDominant;
                    } else {
                        const colorCount = {};
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i];
                            const g = data[i + 1];
                            const b = data[i + 2];
                            const a = data[i + 3];
                            if (a <= 128) continue;
                            const color = quantize(r, g, b);
                            colorCount[color] = (colorCount[color] || 0) + 1;
                        }
                        let maxCount = 0;
                        for (const color in colorCount) {
                            if (colorCount[color] > maxCount) {
                                maxCount = colorCount[color];
                                dominantColor = color;
                            }
                        }
                    }

                    if (!dominantColor) {
                        dominantColor = 'rgba(0,0,0,0.5)';
                    }

                    return dominantColor;
                };

                profile.addEventListener('mouseenter', function() {
                    const color = calculateColor();
                    figure.style.boxShadow = `0 8px 16px ${color}`;
                });

                profile.addEventListener('mouseleave', function() {
                    figure.style.boxShadow = '0 8px 16px rgba(0, 0, 0, 0.5)';
                });
            });
        });
    </script>

    <!-- Armazenar perfil ativo no localStorage -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const profileLinks = document.querySelectorAll('.catalogo');
            profileLinks.forEach(link => {
                link.addEventListener('click', function(event) {
                    // Obtém a figura e os dados
                    const figure = this.querySelector('figure');
                    const img = figure.querySelector('img');
                    const figcaption = figure.querySelector('figcaption');

                    const profileName = figcaption.textContent.trim();
                    const profileImage = img.src; // caminho absoluto ou relativo, conforme carregado

                    // Salva no localStorage
                    localStorage.setItem('activeProfileName', profileName);
                    localStorage.setItem('activeProfileImage', profileImage);

                    // A navegação ocorre normalmente porque o link tem href="catalogo.html"
                });
            });
        });
    </script>

    <script type="module" src="js/index.js"></script>
</body>
</html>
