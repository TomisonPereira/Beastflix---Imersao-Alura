<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Selecione o perfil para começar a assistir na Netflix">
    <title>Beastflix</title>
    <link rel="stylesheet" href="/styles/stylesheet.css">
    <link rel="stylesheet" href="/styles/catalogo.css">
</head>
<body>
    <main class="conteudo-principal">
        <header>
            <h1>Quem está assistindo?</h1>
        </header>
        <section class="profiles">
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Bear.png" alt="Bear">
                        <figcaption>Bear</figcaption>
                    </figure>
                </a>
            </article>
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Cat.png" alt="Cat">
                        <figcaption>Cat</figcaption>
                    </figure>
                </a>
            </article>
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Owl.png" alt="Owl">
                        <figcaption>Owl</figcaption>
                    </figure>
                </a>
            </article>
            <article class="profile">
                <a href="catalogo.html" class="catalogo">
                    <figure>
                        <img src="assets/Wolf.png" alt="Wolf">
                        <figcaption>Wolf</figcaption>
                    </figure>
                </a>
            </article>
        </section>
    </main>

    <!-- Script para efeito de sombra dinâmica -->
   <script>
    document.addEventListener('DOMContentLoaded', function() {
        const profiles = document.querySelectorAll('.profile');

        profiles.forEach(profile => {
            const img = profile.querySelector('img');
            const figure = profile.querySelector('figure');
            let dominantColor = null;

            // Função que extrai a cor dominante das bordas da imagem
            function extractBorderColor() {
                // Se já calculou, retorna direto
                if (dominantColor) return dominantColor;

                // Verifica se a imagem está realmente carregada
                if (!img.complete || img.naturalWidth === 0) {
                    // Ainda não carregada – retorna null para aguardar evento load
                    return null;
                }

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;

                try {
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imageData.data;

                    // Quantização para 16 tons por canal (RGB)
                    const quantize = (r, g, b) => {
                        const qr = Math.round(r / 16) * 16;
                        const qg = Math.round(g / 16) * 16;
                        const qb = Math.round(b / 16) * 16;
                        return `rgb(${qr},${qg},${qb})`;
                    };

                    const borderCount = {};
                    const pushColor = (r, g, b, a) => {
                        if (a <= 128) return;
                        const color = quantize(r, g, b);
                        borderCount[color] = (borderCount[color] || 0) + 1;
                    };

                    const w = canvas.width;
                    const h = canvas.height;

                    // Pixels das bordas (primeira/última linha e coluna)
                    for (let x = 0; x < w; x++) {
                        const topIdx = (0 * w + x) * 4;
                        const bottomIdx = ((h - 1) * w + x) * 4;
                        pushColor(data[topIdx], data[topIdx+1], data[topIdx+2], data[topIdx+3]);
                        pushColor(data[bottomIdx], data[bottomIdx+1], data[bottomIdx+2], data[bottomIdx+3]);
                    }
                    for (let y = 1; y < h - 1; y++) {
                        const leftIdx = (y * w + 0) * 4;
                        const rightIdx = (y * w + (w - 1)) * 4;
                        pushColor(data[leftIdx], data[leftIdx+1], data[leftIdx+2], data[leftIdx+3]);
                        pushColor(data[rightIdx], data[rightIdx+1], data[rightIdx+2], data[rightIdx+3]);
                    }

                    let borderDominant = null;
                    let maxCount = 0;
                    for (const color in borderCount) {
                        if (borderCount[color] > maxCount) {
                            maxCount = borderCount[color];
                            borderDominant = color;
                        }
                    }

                    if (borderDominant) {
                        dominantColor = borderDominant;
                    } else {
                        // Fallback: cor mais comum em toda a imagem
                        const fullCount = {};
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                            if (a <= 128) continue;
                            const color = quantize(r, g, b);
                            fullCount[color] = (fullCount[color] || 0) + 1;
                        }
                        let maxFull = 0;
                        for (const color in fullCount) {
                            if (fullCount[color] > maxFull) {
                                maxFull = fullCount[color];
                                dominantColor = color;
                            }
                        }
                    }

                    if (!dominantColor) {
                        dominantColor = 'rgba(0,0,0,0.5)';
                    }
                } catch (e) {
                    console.warn('Erro ao extrair cor da imagem:', e);
                    dominantColor = 'rgba(0,0,0,0.5)';
                }

                return dominantColor;
            }

            // Aguarda a imagem carregar para extrair a cor
            function onImageLoad() {
                extractBorderColor(); // calcula e armazena em dominantColor
                // Após carregar, podemos remover o listener se desejar
                img.removeEventListener('load', onImageLoad);
            }

            if (img.complete && img.naturalWidth > 0) {
                // Imagem já carregada
                extractBorderColor();
            } else {
                // Aguarda o carregamento
                img.addEventListener('load', onImageLoad);
                // Opcional: fallback caso a imagem demore muito ou falhe
                img.addEventListener('error', function() {
                    dominantColor = 'rgba(0,0,0,0.5)';
                });
            }

            // Aplica a sombra ao passar o mouse
            profile.addEventListener('mouseenter', function() {
                if (dominantColor) {
                    figure.style.boxShadow = `0 8px 16px ${dominantColor}`;
                } else {
                    // Se por algum motivo a cor ainda não estiver disponível, tenta extrair agora
                    const color = extractBorderColor();
                    if (color) {
                        figure.style.boxShadow = `0 8px 16px ${color}`;
                    } else {
                        figure.style.boxShadow = '0 8px 16px rgba(0, 0, 0, 0.5)';
                    }
                }
            });

            profile.addEventListener('mouseleave', function() {
                figure.style.boxShadow = '0 8px 16px rgba(0, 0, 0, 0.5)';
            });
        });
    });
</script>

    <!-- Armazenar perfil ativo no localStorage -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const profileLinks = document.querySelectorAll('.catalogo');
            profileLinks.forEach(link => {
                link.addEventListener('click', function(event) {
                    // Obtém a figura e os dados
                    const figure = this.querySelector('figure');
                    const img = figure.querySelector('img');
                    const figcaption = figure.querySelector('figcaption');

                    const profileName = figcaption.textContent.trim();
                    const profileImage = img.src; // caminho absoluto ou relativo, conforme carregado

                    // Salva no localStorage
                    localStorage.setItem('activeProfileName', profileName);
                    localStorage.setItem('activeProfileImage', profileImage);

                    // A navegação ocorre normalmente porque o link tem href="catalogo.html"
                });
            });
        });
    </script>

    <script type="module" src="js/index.js"></script>
</body>
</html>
